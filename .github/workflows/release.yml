name: Build & release Bed Ready

# Builds the Bed Ready flavor from the (public) KhaytApp/Khayt source on each
# runner OS and publishes the installers to a GitHub Release in THIS repo.
# Trigger manually from the Actions tab.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "KhaytApp/Khayt git ref (branch/tag/sha) to build"
        default: "main"
        required: true
      version:
        description: "Bed Ready version (no leading v)"
        default: "1.0.0-beta.1"
        required: true

permissions:
  contents: write   # create/update the Release in this repo

jobs:
  build:
    # macOS is built + Developer ID-signed locally (CI runners have no signing
    # cert, and would overwrite the signed .dmg with an unsigned one). CI only
    # builds the platforms that need no signing: Windows + Linux.
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            script: "dist:bedready:win"
          - os: ubuntu-latest
            script: "dist:bedready:linux"
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out Khayt source (public)
        uses: actions/checkout@v4
        with:
          repository: KhaytApp/Khayt
          ref: ${{ github.event.inputs.ref }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build Bed Ready (${{ matrix.os }})
        shell: bash
        env:
          BEDREADY_VERSION: ${{ github.event.inputs.version }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"   # macOS Developer ID auto-discovery off
          # ── Windows code signing (Path B: .pfx / eSigner) ─────────────────────
          # No-op until these secrets exist in this repo: an empty value is falsy,
          # so electron-builder builds unsigned exactly as before. Set both to sign
          # the Windows .exe (feed hashes are then computed over the signed bytes).
          # See docs/WINDOWS-SIGNING.md in KhaytApp/Khayt for how to obtain a cert.
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: npm run ${{ matrix.script }}

      # ── Windows code signing (Path A: Azure Trusted Signing — recommended) ──────
      # Preferred over Path B: cloud HSM, no USB token, CI-native. Uncomment and add
      # the AZURE_* secrets (see docs/WINDOWS-SIGNING.md). NOTE: this signs AFTER
      # electron-builder has already hashed latest.yml, so you MUST re-hash the feed
      # afterward or the auto-updater will reject the signed .exe with a sha512
      # mismatch. The cleaner long-term route is an electron-builder `win.sign` hook
      # so hashing always happens post-signing — prefer that when adopting Path A.
      # - name: Sign Windows binaries (Azure Trusted Signing)
      #   if: matrix.os == 'windows-latest' && env.AZURE_CLIENT_ID != ''
      #   uses: azure/trusted-signing-action@v0
      #   with:
      #     azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
      #     azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
      #     azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
      #     endpoint: ${{ secrets.AZURE_TS_ENDPOINT }}
      #     trusted-signing-account-name: ${{ secrets.AZURE_TS_ACCOUNT }}
      #     certificate-profile-name: ${{ secrets.AZURE_TS_PROFILE }}
      #     files-folder: build-bedready
      #     files-folder-filter: exe

      - name: Publish installers to the Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "bedready-v${{ github.event.inputs.version }}"
          prerelease: true
          fail_on_unmatched_files: false
          files: |
            build-bedready/*.dmg
            build-bedready/*.exe
            build-bedready/*.AppImage
            build-bedready/*.deb
            build-bedready/*.zip
            build-bedready/*.blockmap
            build-bedready/latest*.yml

# release pipeline for the Bed Ready public beta
